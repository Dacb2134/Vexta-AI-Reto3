<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PulseAI — Iniciar sesión</title>
  <link rel="stylesheet" href="login.css" />
</head>
<body>
<div class="login-wrap">

  <div class="brand">
    <div class="brand-icon">◎</div>
    <h1>Pulse<span>AI</span></h1>
    <p>Asistente de cobertura médica</p>
  </div>

  <div class="card">
    <div class="field">
      <label for="cedula">Número de cédula</label>
      <input
        type="text"
        id="cedula"
        placeholder="Ej: 0912345678"
        maxlength="13"
        inputmode="numeric"
        autocomplete="off"
      />
    </div>
    <button class="btn" id="loginBtn">Ingresar</button>
    <div class="error" id="errorMsg">
      Cédula no encontrada. Verifica el número e intenta de nuevo.
    </div>
  </div>

  <p class="footer">Solo personal con póliza activa puede acceder</p>
</div>

<script src="config.js"></script>
<script src="services/api.js"></script>
<script>
  const btn     = document.getElementById('loginBtn');
  const input   = document.getElementById('cedula');
  const errorEl = document.getElementById('errorMsg');

  async function doLogin() {
    const cedula = input.value.trim();
    if (!cedula) return;

    btn.disabled = true;
    btn.textContent = 'Buscando...';
    errorEl.style.display = 'none';

    try {
      const data = await ApiService.login(cedula);
      // Guardamos los datos para que index.html los use
      sessionStorage.setItem('policyData', JSON.stringify(data));
      window.location.href = 'index.html';
    } catch (err) {
      errorEl.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Ingresar';
    }
  }

  btn.addEventListener('click', doLogin);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
