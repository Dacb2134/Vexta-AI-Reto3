<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PulseAI — Estimador de Copago y Cobertura</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="app">

  <!-- ══ SIDEBAR ══ -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <span class="logo-icon">◎</span>
      <span class="logo-text">Pulse<span>AI</span></span>
    </div>

    <div class="sidebar-section">
      <p class="sidebar-label">Mi cobertura</p>
      <p class="patient-name" id="patientName">Ana Torres</p>
      <p class="patient-id"   id="patientId">POL-2024-001</p>
      <span class="status-badge">
        <span class="status-dot"></span>Póliza activa
      </span>
      <p class="plan-label">Plan</p>
      <p class="plan-name" id="planName">Premium Gold</p>
      <div class="copago-chips">
        <div class="copago-chip">
          <span class="chip-label">Consulta general</span>
          <span class="chip-value green" id="copagoConsulta">$25</span>
        </div>
        <div class="copago-chip">
          <span class="chip-label">Especialista</span>
          <span class="chip-value green" id="copagoEspec">$45</span>
        </div>
        <div class="copago-chip">
          <span class="chip-label">Emergencia</span>
          <span class="chip-value" id="copagoEmerg">$100</span>
        </div>
      </div>
    </div>

    <div class="sidebar-section">
      <p class="sidebar-label">Preguntas frecuentes</p>
      <div class="quick-btns" id="quickBtns">
        <!-- generados por ui.js -->
      </div>
    </div>

    <div class="sidebar-footer">
      <p>Datos sincronizados con Notion</p>
    </div>
  </aside>

  <!-- ══ MAIN ══ -->
  <div class="main">

    <!-- solo visible en móvil -->
    <div class="mobile-bar">
      <span class="logo-icon" style="color:#fff">◎</span>
      <span class="mobile-logo-text">PulseAI</span>
      <button class="mobile-policy" id="mobilePolicyBtn">Ver mi póliza</button>
    </div>

    <!-- header del chat -->
    <div class="chat-header">
      <div class="chat-header-left">
        <div class="agent-avatar">◎</div>
        <div>
          <div class="agent-name">PulseAI</div>
          <div class="agent-sub">Asistente de cobertura médica</div>
        </div>
      </div>
      <div class="online-badge">
        <span class="online-dot"></span>En línea
      </div>
    </div>

    <!-- área de mensajes -->
    <div class="messages" id="messages">
      <!-- los mensajes se insertan aquí por ui.js -->
    </div>

    <!-- input -->
    <div class="input-bar">
      <div class="input-wrap">
        <input
          type="text"
          id="msgInput"
          placeholder="Describe tu síntoma…"
          autocomplete="off"
        />
      </div>
      <button class="send-btn" id="sendBtn">
        <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
      </button>
    </div>

  </div>
</div>

<!-- ── Scripts — orden importante ── -->
<script src="config.js"></script>
<script src="components/MessageBubble.js"></script>
<script src="components/CoverageCard.js"></script>
<script src="components/TypingIndicator.js"></script>
<script src="services/api.js"></script>
<script src="services/ui.js"></script>
<script src="services/chat.js"></script>
</body>
</html>
